name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-check:
    name: Lint, Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Linting
        run: npm run lint

      - name: Run Type Check (Analyze)
        run: npx tsc --noEmit

      - name: Run Jest Tests
        run: npx jest --ci --maxWorkers=2
        # --ci: Optimized for CI environments
        # --maxWorkers=2: Prevents memory issues on standard CI runners
